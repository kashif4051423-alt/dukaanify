<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle -->
  <circle cx="100" cy="100" r="95" fill="#6366f1" opacity="0.1" stroke="#6366f1" stroke-width="2"/>
  
  <!-- Store Building -->
  <g transform="translate(100, 100)">
    <!-- Storefront Base -->
    <rect x="-50" y="-20" width="100" height="80" fill="#6366f1" rx="8"/>
    
    <!-- Door -->
    <rect x="-15" y="20" width="30" height="40" fill="#4f46e5" rx="4"/>
    <circle cx="-8" cy="40" r="2" fill="#fbbf24"/>
    
    <!-- Windows -->
    <rect x="-45" y="0" width="20" height="20" fill="#a5f3fc" rx="3"/>
    <rect x="25" y="0" width="20" height="20" fill="#a5f3fc" rx="3"/>
    
    <!-- Roof Peak -->
    <polygon points="-60,0 0,-30 60,0" fill="#4f46e5"/>
    
    <!-- Flag on top -->
    <rect x="-2" y="-35" width="4" height="10" fill="#6366f1"/>
    <polygon points="2,-27 2,-25 12,-23 12,-25" fill="#fbbf24"/>
  </g>
</svg>
